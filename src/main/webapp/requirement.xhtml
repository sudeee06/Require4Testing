<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Require4Testing</title>
</h:head>

<h:body>

    <h:link value="Requirements" outcome="requirement.xhtml"/>
    <h:link value="TestCases" outcome="testcases.xhtml"/>
    <h:link value="TestRuns" outcome="testrun.xhtml"/>
    <hr/>

    <h2>Neue Anforderung erstellen</h2>

    <h:form>

        <h:panelGrid columns="1">

            <h:inputText value="#{requirementBean.requirement.title}"
                         required="true"/>

            <br/>

            <h:inputTextarea value="#{requirementBean.requirement.description}"
                             rows="5" cols="40"/>

            <br/>

            <h:commandButton value="Speichern"
                             action="#{requirementBean.save}"/>

        </h:panelGrid>

    </h:form>

</h:body>
</html>
