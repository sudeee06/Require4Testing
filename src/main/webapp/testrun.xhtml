<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>Require4Testing - Testläufe</title>
</h:head>

<h:body>
    <h:link value="Anforderungen" outcome="requirement.xhtml"/> |
    <h:link value="Testfälle" outcome="testcases.xhtml"/> |
    <h:link value="Testläufe" outcome="testrun.xhtml"/> |
    <h:link value="Übersicht" outcome="overview.xhtml"/>
    <hr/>

    <h2>Neuen Testlauf erstellen</h2>


    <h:messages globalOnly="true" style="color:red"/>

    <h:form id="testRunForm">
        <h:panelGrid columns="3">

            <h:outputLabel value="Name des Testlaufs:" for="name"/>
            <h:inputText id="name" value="#{testRunBean.testRun.name}"
                         required="true" label="Testlauf Name">
                <f:validateLength minimum="3"/>
            </h:inputText>
            <h:message for="name" style="color:red"/>


            <h:outputLabel value="Tester Name:" for="tester"/>
            <h:inputText id="tester" value="#{testRunBean.testRun.tester}"
                         required="true" label="Tester"/>
            <h:message for="tester" style="color:red"/>
        </h:panelGrid>

        <br/>
        <h:outputLabel value="Verfügbare Testfälle auswählen (Anforderung 4):"/>
        <br/>

        <h:selectManyCheckbox value="#{testRunBean.selectedTestCaseIds}" required="true">
            <f:selectItems value="#{testRunBean.allTestCases}"
                           var="tc"
                           itemValue="#{tc.id}"
                           itemLabel="#{tc.title}"/>
        </h:selectManyCheckbox>

        <br/>
        <h:commandButton value="Testlauf speichern" action="#{testRunBean.save}"/>
    </h:form>

    <hr/>

    <h2>Bestehende Testläufe</h2>
    <h:dataTable value="#{testRunBean.allTestRuns}" var="tr" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{tr.id}
        </h:column>
        <h:column>
            <f:facet name="header">Name</f:facet>
            #{tr.name}
        </h:column>
        <h:column>
            <f:facet name="header">Tester</f:facet>
            #{tr.tester}
        </h:column>
        <h:column>
            <f:facet name="header">Erstellt am</f:facet>
            <h:outputText value="#{tr.createdAt}">

                <f:convertDateTime pattern="dd.MM.yyyy HH:mm" type="localDateTime"/>
            </h:outputText>
        </h:column>
    </h:dataTable>
</h:body>
</html>
