<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>TestRuns</title>
</h:head>

<h:body>

    <h:link value="Requirements" outcome="requirement.xhtml"/>
    <h:link value="TestCases" outcome="testcases.xhtml"/>
    <h:link value="TestRuns" outcome="testrun.xhtml"/>
    <hr/>

    <h2>Neuen Testlauf erstellen</h2>

    <h:form>

        <h:inputText value="#{testRunBean.testRun.name}"
                     placeholder="Name des Testlaufs" required="true"/>

        <br/><br/>

        <h:outputLabel value="TestCases:" />

        <h:selectManyCheckbox value="#{testRunBean.selectedTestCaseIds}">
            <f:selectItems value="#{testRunBean.allTestCases}"
                           var="tc"
                           itemValue="#{tc.id}"
                           itemLabel="#{tc.title}" />
        </h:selectManyCheckbox>


        <h:commandButton value="Speichern"
                         action="#{testRunBean.save}"/>

    </h:form>

    <h2>Alle Testläufe</h2>

    <h:dataTable value="#{testRunBean.allTestRuns}" var="tr" border="1">

        <h:column>
            <f:facet name="header">ID</f:facet>
            #{tr.id}
        </h:column>

        <h:column>
            <f:facet name="header">Name</f:facet>
            #{tr.name}
        </h:column>

        <h:column>
            <f:facet name="header">Erstellt am</f:facet>
            #{tr.createdAt}
        </h:column>

    </h:dataTable>

</h:body>
</html>
