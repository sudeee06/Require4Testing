<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Aufgabenliste</title>
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css"/>
</h:head>

<h:body>

    <h1>TO-DO WebApp</h1>

    <h:form>

        <h:dataTable value="#{aufgabenListe.liste}" var="aufgabe" border="1">

            <f:facet name="header">
                <h2>Aufgabenliste</h2>
            </f:facet>

            <h:column>
                <f:facet name="header">Text</f:facet>
                #{aufgabe.text}
            </h:column>

            <h:column>
                <f:facet name="header">Person</f:facet>
                #{aufgabe.person}
            </h:column>

            <h:column>
                <f:facet name="header">Fällig am</f:facet>
                #{aufgabe.faelligAm}
            </h:column>

            <h:column>
                <f:facet name="header">Erledigt</f:facet>
                <h:outputText value="✔" rendered="#{aufgabe.erledigt}" />
                <h:outputText value="✘" rendered="#{!aufgabe.erledigt}" />
            </h:column>

            <h:column>
                <f:facet name="header">Aufwand</f:facet>
                #{aufgabe.aufwand}
            </h:column>

        </h:dataTable>

        <br/><br/>

        <h:commandButton value="Ändern"
                         action="#{controller.startEdit}" />

    </h:form>

</h:body>
</html>
