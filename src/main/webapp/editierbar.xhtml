<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Aufgabenliste</title>
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css"/>
</h:head>

<h:body>

    <h1>TO-DO WebApp</h1>

    <h:form>

        <h:dataTable value="#{aufgabenListe.liste}" var="aufgabe" border="1">

            <f:facet name="header">
                <h2>Aufgabenliste ändern</h2>
            </f:facet>

            <h:column>
                <f:facet name="header">Text</f:facet>
                <h:inputText value="#{aufgabe.text}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Person</f:facet>
                <h:inputText value="#{aufgabe.person}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Fällig am</f:facet>
                <h:inputText value="#{aufgabe.faelligAm}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Erledigt</f:facet>
                <h:selectBooleanCheckbox value="#{aufgabe.erledigt}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Aufwand (h)</f:facet>
                <h:inputText value="#{aufgabe.aufwand}"/>
            </h:column>

        </h:dataTable>

        <br/><br/>

        <h:commandButton value="Speichern"
                         action="#{controller.stopEdit}"/>

    </h:form>

</h:body>
</html>
